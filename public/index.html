<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Agent Tester</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      background: #16213e;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    header h1 { font-size: 18px; color: #e94560; white-space: nowrap; }
    .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .controls select, .controls button {
      padding: 6px 12px;
      border: 1px solid #0f3460;
      border-radius: 4px;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 14px;
      cursor: pointer;
    }
    .controls button { background: #e94560; border-color: #e94560; color: white; }
    .controls button:hover { background: #c73a52; }
    .controls button:disabled { background: #555; border-color: #555; cursor: not-allowed; }
    #toggle-btn { background: #0f3460; border-color: #0f3460; }
    #toggle-btn.active { background: #e94560; border-color: #e94560; }

    #status-bar {
      background: #0f3460;
      padding: 6px 20px;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      color: #aaa;
      flex-shrink: 0;
    }
    #status-bar .badge {
      background: #e94560;
      color: white;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
    }

    #main-container {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 75%;
      padding: 10px 16px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 14px;
      word-wrap: break-word;
    }
    .message.user {
      align-self: flex-end;
      background: #e94560;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .message.agent {
      align-self: flex-start;
      background: #16213e;
      border: 1px solid #0f3460;
      border-bottom-left-radius: 4px;
    }
    .message.system {
      align-self: center;
      background: transparent;
      border: 1px dashed #555;
      color: #888;
      font-size: 12px;
      max-width: 90%;
      text-align: center;
    }

    #input-area {
      background: #16213e;
      padding: 16px 20px;
      display: flex;
      gap: 8px;
      border-top: 1px solid #0f3460;
      flex-shrink: 0;
    }
    #input-area input {
      flex: 1;
      padding: 10px 16px;
      border: 1px solid #0f3460;
      border-radius: 6px;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
    }
    #input-area input:focus { border-color: #e94560; }
    #input-area button {
      padding: 10px 24px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    #input-area button:hover { background: #c73a52; }
    #input-area button:disabled { background: #555; cursor: not-allowed; }

    #loading {
      display: none;
      color: #e94560;
      font-size: 13px;
      padding: 8px 20px;
      flex-shrink: 0;
    }

    #prompt-panel {
      width: 0;
      overflow: hidden;
      background: #0d1b2a;
      border-left: 1px solid #0f3460;
      transition: width 0.3s ease;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    #prompt-panel.open { width: 450px; }
    #prompt-panel-header {
      padding: 12px 16px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      font-size: 14px;
      font-weight: bold;
      color: #e94560;
      flex-shrink: 0;
    }
    #prompt-panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      line-height: 1.5;
      color: #aaa;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <header>
    <h1>Voice Agent Tester</h1>
    <div class="controls">
      <select id="flow-select"><option value="">Select flow...</option></select>
      <select id="model-select">
        <option value="openai/gpt-oss-120b" selected>gpt-oss-120b</option>
        <option value="openai/gpt-oss-20b:free">gpt-oss-20b (free)</option>
        <option value="openai/gpt-oss-120b:free">gpt-oss-120b (free)</option>
        <option value="google/gemini-3.1-flash-lite-preview">Gemini 3.1 Flash Lite</option>
        <option value="x-ai/grok-4.1-fast">Grok 4.1 Fast</option>
        <option value="__custom__">Custom...</option>
      </select>
      <input type="text" id="custom-model" placeholder="e.g. anthropic/claude-3.5-sonnet" style="display:none;max-width:260px;" />
      <button id="start-btn" disabled>Start Session</button>
      <button id="reset-btn" style="display:none;">Reset</button>
      <button id="download-btn" style="display:none;">Download Transcript</button>
      <button id="toggle-btn">Show Prompt</button>
    </div>
  </header>
  <div id="status-bar">
    <span id="status-info">No session</span>
    <span id="status-msgs"></span>
  </div>
  <div id="main-container">
    <div id="chat-container"></div>
    <div id="prompt-panel">
      <div id="prompt-panel-header">System Prompt</div>
      <div id="prompt-panel-content"></div>
    </div>
  </div>
  <div id="loading">AI is thinking...</div>
  <div id="input-area">
    <input type="text" id="user-input" placeholder="Type your response..." disabled />
    <button id="send-btn" disabled>Send</button>
  </div>

  <script>
    let sessionId = null;
    let systemPrompt = '';

    const flowSelect = document.getElementById('flow-select');
    const modelSelect = document.getElementById('model-select');
    const customModelInput = document.getElementById('custom-model');
    const startBtn = document.getElementById('start-btn');
    const resetBtn = document.getElementById('reset-btn');
    const downloadBtn = document.getElementById('download-btn');
    const toggleBtn = document.getElementById('toggle-btn');
    const promptPanel = document.getElementById('prompt-panel');
    const promptContent = document.getElementById('prompt-panel-content');
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const statusInfo = document.getElementById('status-info');
    const statusMsgs = document.getElementById('status-msgs');
    const loadingEl = document.getElementById('loading');

    // Load available flows
    fetch('/api/flows')
      .then(r => r.json())
      .then(data => {
        data.flows.forEach(f => {
          const opt = document.createElement('option');
          opt.value = f;
          opt.textContent = f.replace('.json', '').replace(/_/g, ' ');
          flowSelect.appendChild(opt);
        });
      })
      .catch(err => addSystemMessage('Failed to load flows: ' + err.message));

    flowSelect.addEventListener('change', () => {
      startBtn.disabled = !flowSelect.value;
    });

    modelSelect.addEventListener('change', () => {
      const isCustom = modelSelect.value === '__custom__';
      customModelInput.style.display = isCustom ? 'inline-block' : 'none';
      if (isCustom) customModelInput.focus();
    });

    toggleBtn.addEventListener('click', () => {
      promptPanel.classList.toggle('open');
      toggleBtn.classList.toggle('active');
      toggleBtn.textContent = promptPanel.classList.contains('open') ? 'Hide Prompt' : 'Show Prompt';
    });

    startBtn.addEventListener('click', async () => {
      const flowFile = flowSelect.value;
      if (!flowFile) return;

      // Determine model
      let model = modelSelect.value;
      if (model === '__custom__') {
        model = customModelInput.value.trim();
        if (!model) { addSystemMessage('Please enter a custom model ID'); return; }
      }

      try {
        const res = await fetch('/api/session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ flowFile, model }),
        });
        const data = await res.json();
        if (data.error) { addSystemMessage(data.error); return; }

        sessionId = data.sessionId;
        systemPrompt = data.systemPrompt || '';

        chatContainer.innerHTML = '';
        resetBtn.style.display = 'inline-block';
        if (downloadBtn) downloadBtn.style.display = 'inline-block';
        statusInfo.textContent = flowFile;
        statusMsgs.innerHTML = '<span class="badge">0 msgs</span>';
        enableInput();
        addSystemMessage('Session started — type to chat');

        // Display system prompt in side panel
        if (systemPrompt) {
          promptContent.textContent = systemPrompt;
        }
      } catch (err) {
        addSystemMessage('Failed to start: ' + err.message);
      }
    });

    resetBtn.addEventListener('click', () => {
      sessionId = null;
      chatContainer.innerHTML = '';
      promptContent.textContent = '';
      resetBtn.style.display = 'none';
      if (downloadBtn) downloadBtn.style.display = 'none';
      statusInfo.textContent = 'No session';
      statusMsgs.textContent = '';
      userInput.disabled = true;
      sendBtn.disabled = true;
    });

    if (downloadBtn) {
      downloadBtn.addEventListener('click', async () => {
        if (!sessionId) return;
        try {
          const res = await fetch(`/api/transcript/${sessionId}`);
          const data = await res.json();
          const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `transcript_${sessionId}_${data.flowFile.replace('.json','')}.json`;
          a.click();
          URL.revokeObjectURL(url);
        } catch (err) {
          addSystemMessage('Download failed: ' + err.message);
        }
      });
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text || !sessionId) return;

      addUserMessage(text);
      userInput.value = '';
      userInput.disabled = true;
      sendBtn.disabled = true;
      loadingEl.style.display = 'block';

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId, userMessage: text }),
        });
        const data = await res.json();
        if (data.error) { addSystemMessage(data.error); enableInput(); return; }

        if (data.agentResponse) {
          // messageIndex is the index in session.messages AFTER this push
          const msgIdx = (data.messageCount || 0) - 1;
          addAgentMessage(data.agentResponse, data.finishReason, msgIdx);
        }
        statusMsgs.innerHTML = `<span class="badge">${data.messageCount || 0} msgs</span>`;
      } catch (err) {
        addSystemMessage('Chat error: ' + err.message);
      }

      loadingEl.style.display = 'none';
      enableInput();
    }

    function addUserMessage(text) {
      const div = document.createElement('div');
      div.className = 'message user';
      div.textContent = text;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function addAgentMessage(text, finishReason, messageIndex) {
      const div = document.createElement('div');
      div.className = 'message agent';
      const textDiv = document.createElement('div');
      textDiv.textContent = text;
      div.appendChild(textDiv);

      // Comment section
      const commentSection = document.createElement('div');
      commentSection.style.cssText = 'margin-top:8px;display:flex;gap:4px;align-items:center;flex-wrap:wrap;';
      
      const commentBtn = document.createElement('button');
      commentBtn.textContent = '💬 Comment';
      commentBtn.style.cssText = 'background:none;border:none;cursor:pointer;font-size:12px;color:#888;padding:2px 4px;';
      commentBtn.title = 'Add a comment to this response';
      
      const commentInput = document.createElement('input');
      commentInput.type = 'text';
      commentInput.placeholder = 'Add a note...';
      commentInput.style.cssText = 'display:none;flex:1;min-width:150px;background:#1a1a2e;border:1px solid #0f3460;border-radius:4px;padding:4px 8px;color:#e0e0e0;font-size:12px;';
      
      const saveBtn = document.createElement('button');
      saveBtn.textContent = 'Save';
      saveBtn.style.cssText = 'display:none;background:#0f3460;border:none;border-radius:4px;padding:4px 8px;color:white;font-size:11px;cursor:pointer;';
      
      commentSection.appendChild(commentBtn);
      commentSection.appendChild(commentInput);
      commentSection.appendChild(saveBtn);
      div.appendChild(commentSection);

      let currentComment = '';

      commentBtn.addEventListener('click', () => {
        const isVisible = commentInput.style.display !== 'none';
        commentInput.style.display = isVisible ? 'none' : 'inline-block';
        saveBtn.style.display = isVisible ? 'none' : 'inline-block';
        if (!isVisible) commentInput.focus();
      });

      saveBtn.addEventListener('click', async () => {
        const newComment = commentInput.value.trim();
        if (!sessionId || messageIndex === undefined) return;
        try {
          await fetch('/api/comment', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sessionId, messageIndex, comment: newComment }),
          });
          currentComment = newComment;
          commentBtn.textContent = newComment ? '💬 (' + newComment + ')' : '💬 Comment';
          commentInput.style.display = 'none';
          saveBtn.style.display = 'none';
        } catch (err) {
          console.error('Failed to save comment:', err);
        }
      });

      if (finishReason && finishReason !== 'stop') {
        const meta = document.createElement('div');
        meta.style.cssText = 'font-size:10px;color:#666;margin-top:4px;';
        meta.textContent = `finish: ${finishReason}`;
        div.appendChild(meta);
      }
      div.appendChild(commentSection);
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function addSystemMessage(text) {
      const div = document.createElement('div');
      div.className = 'message system';
      div.textContent = text;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function enableInput() {
      userInput.disabled = false;
      sendBtn.disabled = false;
      userInput.focus();
    }
  </script>
</body>
</html>
